---
info:
  description: API pour gérer une collection de cartes Pokémon
  title: Pokémon Cards API
  version: 1.0.0
openapi: 3.0.0
paths:
  /pokemons-cards:
    get:
      responses:
        '200':
          description: Liste des Pokémon
      summary: Récupérer tous les Pokémon
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                imageUrl:
                  type: string
                lifePoints:
                  type: integer
                name:
                  type: string
                pokedexId:
                  type: integer
                size:
                  type: number
                typeId:
                  type: integer
                weight:
                  type: number
              type: object
        required: true
      responses:
        '201':
          description: Pokémon créé
      summary: Créer un nouveau Pokémon
  /pokemons-cards/{pokemonCardId}:
    delete:
      parameters:
        - in: path
          name: pokemonCardId
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Pokémon supprimé
        '404':
          description: ID non trouvé
      summary: Supprimer un Pokémon
    patch:
      parameters:
        - in: path
          name: pokemonCardId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              properties:
                lifePoints:
                  type: integer
                name:
                  type: string
              type: object
      responses:
        '200':
          description: Pokémon mis à jour
        '404':
          description: ID non trouvé
      summary: Modifier un Pokémon
  /users:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  example: admin@test.fr
                  type: string
                password:
                  example: password123
                  type: string
              required: [email, password]
              type: object
        required: true
      responses:
        '201':
          description: Utilisateur créé
        '400':
          description: Champs manquants ou email déjà utilisé
      summary: Créer un utilisateur
  /users/login:
    post:
      requestBody:
        content:
          application/json:
            schema:
              properties:
                email:
                  type: string
                password:
                  type: string
              required: [email, password]
              type: object
        required: true
      responses:
        '201':
          description: Connexion réussie, renvoie le token
        '400':
          description: Mot de passe incorrect
        '404':
          description: Utilisateur non trouvé
      summary: Se connecter