openapi: 3.0.0
info:
  title: Pokémon Cards API
  version: 1.0.0
  description: API pour gérer une collection de cartes Pokémon
paths:
  /pokemons-cards:
    get:
      summary: Récupérer tous les Pokémon
      responses:
        '200':
          description: Liste des Pokémon
    post:
      summary: Créer un nouveau Pokémon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                pokedexId: { type: integer }
                typeId: { type: integer }
                lifePoints: { type: integer }
                size: { type: number }
                weight: { type: number }
                imageUrl: { type: string }
      responses:
        '201':
          description: Pokémon créé

  /pokemons-cards/{pokemonCardId}:
    patch:
      summary: Modifier un Pokémon
      parameters:
        - name: pokemonCardId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                lifePoints: { type: integer }
      responses:
        '200':
          description: Pokémon mis à jour
        '404':
          description: ID non trouvé
    delete:
      summary: Supprimer un Pokémon
      parameters:
        - name: pokemonCardId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Pokémon supprimé
        '404':
          description: ID non trouvé